<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Bungee&display=swap");
        html,body{
            height: 100%;
            margin: 0;
        }
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            display: flex;
            justify-items: center;
            align-content: center;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .blackimg{
            opacity: 40%;
            width: 100%;
            height: 100%;
        }
        .backgroundimg{
            inset: 0;
            position: absolute;
            background-image: url(images/pet.png);
            background-repeat: no-repeat;
            background-size: cover ;
            background-position: center center;
            width: 100%;
            height: 100%;
            filter: blur(3px);
            
        }
        .content{
            
            position: absolute;
            display: grid;
            grid-template-areas: ". logo ."
                                 " text1 pawimg text2"
                                 ". enter .";
            grid-template-columns: auto auto auto;
            grid-template-rows: auto auto auto;
            place-items: center;
            margin: 0vw 0vw 8vw 7vw;
            
        }
        .content h1{
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 14vw;
            color: #8b61c2;        
            font-family: "Bungee", sans-serif;
            align-self: center;
            justify-self: center;
            word-spacing: 5vw;
            
        }
        .paw{
            grid-area:text1 ;
        }
        .some{
            grid-area: text2;
        }
       .pawimg{
        width: 17vw;
        grid-area: pawimg;
       }
       .logo{
        grid-area: logo;
        width: 17vw;
       }
       .enter_button
       {
        margin-top: 20px;
        grid-area: enter;
        border: 4px solid black ;
        border-radius: 30px;
        padding: 15px 35px;
        background-color: rgba(250, 235, 215, 0.352);
        font-family: "Bungee";
        font-weight: -15px;
    
       }

        

    </style>
</head>
<body>
    <div class="container">
        <div class="backgroundimg">
            <img class="blackimg" src="images/black.png" alt="">
        </div>
        <div class="content">
            <h1 class="paw">paw</h1>
            <h1 class="some">some</h1>
            <img class="pawimg" src="images/paw.png" alt="">
            <img class="logo" src="images/logo.png" alt="">
            <div class="enter_button">
                <h4>open</h4>
            </div>
        </div>
    </div>
</body>
</html>
